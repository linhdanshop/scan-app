<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  padding: 10px;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
}

button {
  background: #007bff;
  color: white;
  border: none;
}

#reader {
  width: 100%;
  margin-top: 10px;
}
</style>

</head>

<body>

<h2>Quét Bill</h2>

<select id="nhanvien">
  <option>Thuy</option>
  <option>A</option>
  <option>B</option>
</select>

<input id="gianhap" placeholder="Giá nhập">
<button onclick="mode='gia'; startScan()">Quét giá</button>

<input id="masp" placeholder="Mã SP">
<button onclick="mode='sp'; startScan()">Quét SP</button>

<input id="sdt" placeholder="SĐT">
<button onclick="mode='sdt'; startScan()">Quét & lưu</button>

<div id="reader"></div>

<script>

const API = "DÁN_API_CỦA_BẠN";

// ===== STATE =====
let mode = "";
let scanner;
let lastScanTime = 0;

// ===== SESSION =====
let SESSION = localStorage.getItem("session") || Date.now();
localStorage.setItem("session", SESSION);

// ===== LOAD =====
window.onload = () => {
  document.getElementById("nhanvien").value = localStorage.getItem("nhanvien") || "";
  document.getElementById("gianhap").value = localStorage.getItem("gianhap") || "";
  document.getElementById("masp").value = localStorage.getItem("masp") || "";
};

// ===== SAVE =====
function saveData() {
  localStorage.setItem("nhanvien", document.getElementById("nhanvien").value);
  localStorage.setItem("gianhap", document.getElementById("gianhap").value);
  localStorage.setItem("masp", document.getElementById("masp").value);
}

// ===== SEND =====
function sendData(sdt) {

  const data = {
    email: "test@gmail.com",
    nhanvien: document.getElementById("nhanvien").value,
    session: SESSION,
    scan_id: Date.now(),
    gianhap: document.getElementById("gianhap").value,
    masp: document.getElementById("masp").value,
    sdt: sdt
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  navigator.vibrate(200);
  document.getElementById("sdt").value = "";
}

// ===== SCAN =====
function startScan() {

  if (scanner) {
    scanner.stop();
  }

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    // 👉 Ưu tiên camera sau
    let backCam = devices.find(d => d.label.toLowerCase().includes("back"));
    let cameraId = backCam ? backCam.id : devices[0].id;

    scanner.start(
      cameraId,
      {
        fps: 20,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0
      },
      (text) => {

        // 👉 chống quét trùng nhanh
        let now = Date.now();
        if (now - lastScanTime < 1000) return;
        lastScanTime = now;

        handleScan(text);
      }
    );

  });
}

// ===== HANDLE =====
function handleScan(text) {

  if (mode === "gia") {
    document.getElementById("gianhap").value = text;
  }

  if (mode === "sp") {
    document.getElementById("masp").value = text;
  }

  if (mode === "sdt") {
    sendData(text);
  }

  saveData();
}

</script>

</body>
</html>
