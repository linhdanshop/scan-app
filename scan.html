<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h3>Quét Bill</h3>

<select id="nhanvien">
  <option>Thuy</option>
  <option>A</option>
  <option>B</option>
</select>

<br><br>

<input id="gianhap" placeholder="Giá nhập">
<button onclick="scanGia()">Quét Giá</button>

<br><br>

<input id="masp" placeholder="Mã SP">
<button onclick="scanSP()">Quét SP</button>

<br><br>

<input id="sdt" placeholder="SĐT">
<button onclick="scanSDT()">Quét SĐT</button>

<br><br>

<button onclick="logout()">Đổi người</button>

<div id="reader" style="width:300px"></div>

<script>

const API = "DÁN_API_CỦA_BẠN_VÀO_ĐÂY";

// ===== SESSION =====
function createSession() {
  return Date.now() + "_" + Math.random().toString(36).substring(2,8);
}

let SESSION = localStorage.getItem("session") || createSession();
localStorage.setItem("session", SESSION);

// ===== LOAD =====
window.onload = () => {
  document.getElementById("nhanvien").value = localStorage.getItem("nhanvien") || "";
  document.getElementById("gianhap").value = localStorage.getItem("gianhap") || "";
  document.getElementById("masp").value = localStorage.getItem("masp") || "";
};

// ===== SAVE =====
function saveData() {
  localStorage.setItem("nhanvien", document.getElementById("nhanvien").value);
  localStorage.setItem("gianhap", document.getElementById("gianhap").value);
  localStorage.setItem("masp", document.getElementById("masp").value);
}

// ===== SCAN ID =====
function createScanID() {
  return Date.now() + "_" + Math.random().toString(36).substring(2,6);
}

// ===== SEND =====
function sendData(sdt) {

  saveData();

  const data = {
    email: "test@gmail.com",
    nhanvien: document.getElementById("nhanvien").value,
    session: SESSION,
    scan_id: createScanID(),
    gianhap: document.getElementById("gianhap").value,
    masp: document.getElementById("masp").value,
    sdt: sdt
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  navigator.vibrate(200);

  document.getElementById("sdt").value = "";
}

// ===== SCAN =====
let scanner;

function startScan(callback) {

  if (scanner) scanner.stop();

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    scanner.start(
      devices[0].id,
      { fps: 15, qrbox: 250 },
      (text) => {
        callback(text);
      }
    );

  });
}

// ===== ACTION =====
function scanGia() {
  startScan((text) => {
    document.getElementById("gianhap").value = text;
    saveData();
  });
}

function scanSP() {
  startScan((text) => {
    document.getElementById("masp").value = text;
    saveData();
  });
}

function scanSDT() {
  startScan((text) => {
    sendData(text);
  });
}

// ===== LOGOUT =====
function logout() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
