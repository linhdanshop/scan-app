<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quét đơn</title>

<style>
body { font-family:Arial; background:#f5f5f5; padding:10px; max-width:500px; margin:auto; }
input, select {
  width:100%; padding:16px; font-size:20px;
  margin:6px 0; border-radius:10px; border:1px solid #ccc;
}
#log { margin-top:10px; max-height:200px; overflow:auto; font-size:16px; }
.ok{color:green;} .err{color:red;} .warn{color:orange;}
</style>

</head>

<body>

<h2>📦 QUÉT ĐƠN</h2>

<select id="nv">
  <option value="">Chọn nhân viên</option>
  <option>Nhung</option>
  <option>Hieu</option>
</select>

<input id="gia" placeholder="Nhập giá">

<input id="scan" placeholder="Quét tại đây" autofocus>

<div id="status">Chưa có MSP</div>
<div id="count">SL: 0</div>

<div id="log"></div>

<script>

// ===== API =====
const API = "https://script.google.com/macros/s/AKfycbw-rjw-aLrULI_CF8pV12oDnaVpEnsSpmUFlhexg6DzQ-cWm-43FVPYiYScPbmEurN71w/exec";

// ===== BIẾN =====
let gia = 0;
let masp = "";
let count = 0;
let lock = false; // chống scan loạn

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
  if(el.children.length > 15) el.removeChild(el.lastChild);
}

// ===== NHẬP GIÁ =====
document.getElementById("gia").addEventListener("input", e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    gia = parseInt(v)*1000;
    masp = "";
    count = 0;
    update();
    log("💰 Giá OK → quét MSP");
  }
});

// ===== QUÉT =====
document.getElementById("scan").addEventListener("keydown", e=>{
  if(e.key !== "Enter") return;

  let text = e.target.value.trim();
  e.target.value = "";

  if(lock) return; // chặn spam
  lock = true;
  setTimeout(()=>lock=false, 300);

  handle(text);
});

function handle(text){

  let nv = document.getElementById("nv").value;

  if(!nv){ return err("Chọn nhân viên"); }
  if(!gia){ return err("Nhập giá"); }

  // ===== MSP =====
  if(!masp){
    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: "+masp;
      ok("📦 "+masp);
      return;
    }
    if(isPhone(text)){
      return err("Phải quét MSP trước");
    }
  }

  // ===== SĐT =====
  if(masp){

    if(isPhone(text)){
      count++;
      update();

      ok(`✔ ${masp} | ${text}`);

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:Date.now(),
          nv, masp, sdt:text, gia
        })
      });

      return;
    }

    if(isMSP(text)){
      return err("Đang quét SĐT rồi");
    }
  }

  err("Sai dữ liệu");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "SL: "+count;
}

// ===== RESET =====
function ok(msg){ log(msg,"ok"); }
function err(msg){ log("❌ "+msg,"err"); }

// ===== AUTO FOCUS =====
setInterval(()=>{
  document.getElementById("scan").focus();
},300);

</script>

</body>
</html>
