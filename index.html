<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QUÉT ĐƠN PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

/* FIX KHÔNG VỠ UI */
.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

h2{text-align:center;}

.row{display:flex; gap:10px; margin-bottom:10px;}

input{
  flex:1;
  padding:16px;
  font-size:20px;
  border-radius:10px;
  border:1px solid #ccc;
}

.box{
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  font-weight:bold;
  border:2px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

#giaBox{color:red;}
#mspBox{
  font-size:24px;
  border:2px solid #007bff;
  margin-bottom:10px;
}

#countAll{color:red; font-weight:bold;}

button{
  flex:1;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.cam{background:#007bff;}
.stop{background:red;}

.table{
  background:#fff;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

.rowItem{
  display:flex;
  border-bottom:1px solid #eee;
  padding:6px 0;
}

.cell{flex:1; font-size:14px;}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  z-index:9999;
}

/* CAMERA FULL */
#reader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:9999;
  display:none;
}

#readerBox{
  width:100%;
  height:100%;
}

#closeCam{
  position:absolute;
  top:20px;
  right:20px;
  background:red;
  color:#fff;
  padding:12px;
  border-radius:50%;
  font-size:18px;
  z-index:10000;
}
</style>

</head>

<body>

<div class="container">

<h2>📦 QUÉT ĐƠN PRO</h2>

<div class="row">
  <input id="gia" placeholder="Nhập giá">
  <div class="box" id="giaBox">--</div>
</div>

<div class="box" id="mspBox">MSP: --</div>

<input id="scan" placeholder="Quét MSP hoặc SĐT">

<div class="row">
  <button class="cam" onclick="startCam()">📷 Cam</button>
  <button class="stop" onclick="stopCam()">⛔ Tắt</button>
</div>

<div class="row">
  <div class="box">MSP: <span id="countMSP">0</span></div>
  <div class="box">Tổng: <span id="countAll">0</span></div>
</div>

<div class="table" id="list"></div>

</div>

<!-- CAMERA -->

<div id="reader">
  <div id="closeCam" onclick="stopCam()">✖</div>
  <div id="readerBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let gia="", masp="";
let countMSP=0, countAll=0;
let data=[];
let cam=null;
let lastScan=""; // chống quét trùng nhanh

document.getElementById("gia").addEventListener("input",e=>{
  gia=e.target.value.trim();
  updateUI();
});

document.getElementById("scan").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    handleInput(e.target.value.trim());
    e.target.value="";
  }
});

function handleInput(val){

  if(!val) return;

  // chống quét trùng liên tục
  if(val===lastScan) return;
  lastScan=val;
  setTimeout(()=>lastScan="",500);

  if(!gia){
    showToast("Nhập giá trước");
    return;
  }

  if(!masp){
    masp=val;
    countMSP=0;
    updateUI();
    showToast("✔ MSP");
    return;
  }

  let obj={
    msp:masp,
    sdt:val,
    gia:gia,
    time:new Date().toLocaleTimeString()
  };

  data.unshift(obj);

  countMSP++;
  countAll++;

  render();
  updateUI();
  showToast("✔ OK");
}

function render(){

  let html=`
  <div class="rowItem">
    <b class="cell">MSP</b>
    <b class="cell">SĐT</b>
    <b class="cell">Giá</b>
    <b class="cell">Time</b>
  </div>`;

  for(let i=0;i<data.length;i++){
    let d=data[i];

    html+=`
    <div class="rowItem">
      <div class="cell">${d.msp}</div>
      <div class="cell">${d.sdt}</div>
      <div class="cell">${d.gia*1000}</div>
      <div class="cell">${d.time}</div>
    </div>`;
  }

  document.getElementById("list").innerHTML=html;
}

function updateUI(){

  document.getElementById("giaBox").innerHTML =
    gia ? gia+' ✔' : "--";

  document.getElementById("mspBox").innerHTML =
    masp ? masp+' ✔' : "MSP: --";

  document.getElementById("countMSP").innerText=countMSP;
  document.getElementById("countAll").innerText=countAll;
}

function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1000);
}

/* CAMERA CHUẨN */
function startCam(){

  document.getElementById("reader").style.display="block";

  cam = new Html5Qrcode("readerBox");

  Html5Qrcode.getCameras().then(devices=>{

    // ưu tiên camera sau
    let backCam = devices.find(d=>d.label.toLowerCase().includes("back"));
    let camId = backCam ? backCam.id : devices[0].id;

    cam.start(
      camId,
      {
        fps:20,
        qrbox:350
      },
      txt=>{
        handleInput(txt);
      }
    );
  });
}

function stopCam(){
  document.getElementById("reader").style.display="none";

  if(cam){
    cam.stop().then(()=>{
      cam.clear();
    });
  }
}

</script>

</body>
</html>
