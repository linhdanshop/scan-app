<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan PRO</title>

<style>
body {
  margin:0;
  background:#f2f2f2;
  font-family:Arial;
}
.box {
  max-width:480px;
  margin:auto;
  padding:12px;
}

h2 {
  text-align:center;
}

input {
  width:100%;
  padding:18px;
  margin:6px 0;
  font-size:22px;
  border-radius:12px;
  border:1px solid #ccc;
}

.status {
  background:#fff;
  padding:12px;
  border-radius:10px;
  font-size:18px;
  margin-top:6px;
}

#log {
  margin-top:10px;
  max-height:200px;
  overflow:auto;
}

.ok{color:green;}
.err{color:red;}
</style>

</head>

<body>

<div class="box">

<h2>📦 QUÉT ĐƠN</h2>

<input id="manv" placeholder="Mã nhân viên">

<input id="gia" placeholder="Nhập giá">

<div class="status" id="status">Chưa có MSP</div>

<input id="scan" placeholder="Quét tại đây..." autofocus>

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

</div>

<script>

// ===== CONFIG =====
const API = "DAN_LINK_API";
const USERS = { "111":"Nhung", "222":"Hieu" };

// ===== LOAD NV =====
let saved = localStorage.getItem("nv");
if(saved) document.getElementById("manv").value = saved;

// ===== STATE =====
let gia = 0;
let masp = "";
let count = 0;

// chống loạn
let buffer = "";
let timer = null;

// ===== CHECK =====
const isPhone = t => /^\d{10}$/.test(t);
const isMSP = t => /[A-Za-z]/.test(t) && /\d/.test(t);

// ===== LOG =====
function log(msg, cls="ok"){
  let el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
  if(el.children.length > 12) el.removeChild(el.lastChild);
}

// ===== GIÁ =====
document.getElementById("gia").oninput = e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    gia = parseInt(v)*1000;
    masp = "";
    count = 0;
    update();
    log("💰 Nhập giá → quét MSP");
  }
};

// ===== QUÉT =====
document.getElementById("scan").addEventListener("input", e=>{

  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(()=>{
    processScan(buffer.trim());
    e.target.value = "";
    buffer = "";
  }, 80); // cực quan trọng
});

function processScan(text){

  if(!text) return;

  let manv = document.getElementById("manv").value.trim();
  let nv = USERS[manv];

  if(!nv){
    return log("❌ Sai mã NV","err");
  }

  localStorage.setItem("nv", manv);

  if(!gia){
    return log("❌ Nhập giá trước","err");
  }

  // ===== MSP =====
  if(!masp){

    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: "+masp;
      return log("📦 "+masp);
    }

    if(isPhone(text)){
      return log("❌ Quét MSP trước","err");
    }
  }

  // ===== SĐT =====
  if(masp){

    if(isPhone(text)){
      count++;
      update();

      log(`✔ ${masp} | ${text}`);

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:Date.now(),
          nhanvien:nv,
          masp,
          sdt:text,
          gia
        })
      });

      return;
    }

    if(isMSP(text)){
      return log("❌ Đang quét SĐT","err");
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: "+count;
}

// ===== AUTO FOCUS =====
setInterval(()=>{
  document.getElementById("scan").focus();
},300);

</script>

</body>
</html>
