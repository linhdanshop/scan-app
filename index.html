<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 15px; }
input, button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
}
#reader {
  width: 100%;
  margin-top: 10px;
}
#log {
  margin-top: 15px;
  max-height: 150px;
  overflow: auto;
}
</style>
</head>

<body>

<h3>QUÉT ĐƠN</h3>

<input id="nhanvien" placeholder="Nhân viên">
<input id="gia" placeholder="Giá">
<input id="masp" placeholder="Mã SP">

<button onclick="startScan()">📷 Bắt đầu quét</button>
<button onclick="stopScan()">⛔ Dừng quét</button>

<div id="reader"></div>

<div id="log"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwIwIDVi5KRK7G-xP8uxAIf00BVdSHYHFUd9wAptVppe2me_rMCJZHpAHwBjtk698WN9A/exec";

let lastGia = "";
let lastMasp = "";

document.getElementById("gia").addEventListener("change", e => {
  lastGia = e.target.value;
});

document.getElementById("masp").addEventListener("change", e => {
  lastMasp = e.target.value;
});

let html5QrCode;

function startScan() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      // 🔥 chọn camera sau (camera cuối)
      const cameraId = devices[devices.length - 1].id;

      html5QrCode.start(
        cameraId,
        {
          fps: 10,
          qrbox: 250
        },
        onScanSuccess
      );
    }
  });
}

function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop();
  }
}

function onScanSuccess(decodedText) {

  const nhanvien = document.getElementById("nhanvien").value;
  const gia = lastGia;
  const masp = lastMasp;
  const sdt = decodedText;

  if (!nhanvien || !gia || !masp) {
    alert("Thiếu dữ liệu");
    return;
  }

  // 🔥 HIỆN NGAY (KHÔNG DELAY)
  const log = document.getElementById("log");
  log.innerHTML = `<div>✔ ${sdt}</div>` + log.innerHTML;

  // 🔥 GỬI NỀN
  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nhanvien, gia, masp, sdt })
  });

}

</script>

</body>
</html>
