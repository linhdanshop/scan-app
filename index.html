<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan ổn định</title>

<style>
body { margin:0; background:#f5f5f5; font-family:Arial; }
.container { max-width:500px; margin:auto; padding:10px; }

input, select {
  width:100%; padding:16px; margin:6px 0;
  font-size:20px; border-radius:10px; border:1px solid #ccc;
}

.status {
  background:#fff; padding:10px; border-radius:10px;
  font-size:18px; margin-top:5px;
}

#log {
  max-height:200px;
  overflow:auto;
  margin-top:10px;
}

.ok { color:green; }
.err { color:red; }
</style>
</head>

<body>

<div class="container">

<h2>📦 TEST QUÉT</h2>

<input id="gia" placeholder="Nhập giá">

<div class="status" id="status">Chưa có MSP</div>

<input id="scan" placeholder="Quét tại đây..." autofocus>

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

</div>

<script>

// ===== STATE =====
let gia = 0;
let masp = "";
let count = 0;

// chống loạn
let lastText = "";
let lastTime = 0;

// ===== CHECK =====
function clean(t){
  return t.replace(/[\r\n]/g,"").trim();
}

function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
  if(el.children.length > 10) el.removeChild(el.lastChild);
}

// ===== GIÁ =====
document.getElementById("gia").oninput = e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    gia = parseInt(v)*1000;
    masp = "";
    count = 0;
    update();
    log("💰 OK → quét MSP");
  }
};

// ===== QUÉT =====
document.getElementById("scan").addEventListener("input", e=>{

  setTimeout(()=>{
    let text = clean(e.target.value);
    e.target.value = "";

    if(!text) return;

    let now = Date.now();

    // CHỐNG DOUBLE
    if(text === lastText && now - lastTime < 800){
      return;
    }

    lastText = text;
    lastTime = now;

    handle(text);

  }, 60);

});

function handle(text){

  if(!gia){
    return log("❌ Nhập giá trước","err");
  }

  // MSP
  if(!masp){
    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: "+masp;
      return log("📦 "+masp);
    }

    if(isPhone(text)){
      return log("❌ Quét MSP trước","err");
    }
  }

  // SĐT
  if(masp){
    if(isPhone(text)){
      count++;
      update();
      return log(`✔ ${masp} | ${text}`);
    }

    if(isMSP(text)){
      return log("❌ Đang quét SĐT","err");
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: "+count;
}

// focus
setInterval(()=>{
  document.getElementById("scan").focus();
},300);

</script>

</body>
</html>
