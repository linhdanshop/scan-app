<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quét đơn PRO</title>

<style>
body { margin:0; background:#f5f5f5; font-family:Arial; }
.container { max-width:500px; margin:auto; padding:10px; }

input {
  width:100%; padding:16px; margin:6px 0;
  font-size:20px; border-radius:10px; border:1px solid #ccc;
}

button {
  width:100%; padding:16px; margin:6px 0;
  font-size:20px; border:none; border-radius:12px;
  color:#fff;
}

.btn-blue { background:#007bff; }
.btn-red { background:red; }

.status {
  background:#fff; padding:10px; border-radius:10px;
  font-size:18px; margin-top:5px;
}

#log {
  max-height:220px;
  overflow:auto;
  font-size:16px;
  margin-top:10px;
}

.ok { color:green; }
.err { color:red; }
</style>

</head>

<body>

<div class="container">

<h2>📦 QUÉT ĐƠN</h2>

<!-- LOGIN -->

<input id="manv" placeholder="Nhập mã nhân viên">

<input id="gia" placeholder="Nhập giá">

<div class="status" id="status">Chưa có MSP</div>

<input id="scanInput" placeholder="Quét tại đây..." autofocus>

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

</div>

<script>

// ===== API =====
const API = "https://script.google.com/macros/s/XXX/exec";

// ===== NHÂN VIÊN =====
const USERS = {
  "111": "Nhung",
  "222": "Hieu"
};

// ===== LOAD NV =====
let currentNV = localStorage.getItem("nv") || "";
if(currentNV){
  document.getElementById("manv").value = currentNV;
}

// ===== BIẾN =====
let lastGia = 0;
let lastMasp = "";
let count = 0;

let lastScan = "";
let lastTime = 0;

// ===== VOICE =====
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "vi-VN";
  speechSynthesis.speak(msg);
}

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
  if(el.children.length > 15) el.removeChild(el.lastChild);
}

// ===== GIÁ =====
document.getElementById("gia").addEventListener("input", e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    lastGia = parseInt(v)*1000;
    lastMasp = "";
    count = 0;
    update();
    log("💰 Nhập giá → quét MSP");
  }
});

// ===== QUÉT =====
document.getElementById("scanInput").addEventListener("keydown", e=>{
  if(e.key !== "Enter") return;

  let text = e.target.value.trim();
  e.target.value = "";

  // ===== CHỐNG LOẠN =====
  let now = Date.now();

  if(text === lastScan && now - lastTime < 500){
    return; // bỏ scan trùng
  }

  lastScan = text;
  lastTime = now;

  if(!text) return;

  handleScan(text);
});

function handleScan(text){

  let manv = document.getElementById("manv").value.trim();
  let nv = USERS[manv];

  if(!nv){
    log("❌ Mã NV sai","err");
    speak("Sai mã nhân viên");
    return;
  }

  // lưu lại
  localStorage.setItem("nv", manv);

  if(!lastGia){
    log("❌ Nhập giá trước","err");
    speak("Nhập giá trước");
    return;
  }

  // ===== MSP =====
  if(!lastMasp){

    if(isMSP(text)){
      lastMasp = text;
      document.getElementById("status").innerText = "MSP: "+lastMasp;
      log("📦 "+lastMasp);
      return;
    }

    if(isPhone(text)){
      log("❌ Quét MSP trước","err");
      speak("Quét mã sản phẩm trước");
      return;
    }
  }

  // ===== SĐT =====
  if(lastMasp){

    if(isPhone(text)){
      count++;
      update();

      log(`✔ ${lastMasp} | ${text}`);

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:Date.now(),
          nhanvien:nv,
          masp:lastMasp,
          sdt:text,
          gia:lastGia
        })
      });

      return;
    }

    if(isMSP(text)){
      log("❌ Đang quét SĐT","err");
      speak("Đang quét số điện thoại");
      return;
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: "+count;
}

// ===== AUTO FOCUS =====
setInterval(()=>{
  document.getElementById("scanInput").focus();
},300);

</script>

</body>
</html>
