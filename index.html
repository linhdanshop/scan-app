<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background:#f5f5f5;
}

/* SP nổi bật */
.sp-box {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  font-size: 22px;
  font-weight: bold;
  color: #007bff;
  text-align: center;
  margin-bottom: 10px;
}

/* Giá + nút */
.price-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.price-row input {
  flex: 1;
  padding: 15px;
  font-size: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.price-row button {
  width: 140px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #28a745;
  color: white;
}

.price-row button:active {
  background:#1e7e34;
}

/* Nút scan */
.scan-btn {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

/* camera */
#reader {
  width: 100%;
  max-width: 400px;
  display:none;
  margin-bottom:10px;
}

/* danh sách */
.list {
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.item {
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:15px;
}

.item:active {
  background:#ffecec;
}

.time {
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="sp-box">
  SP: <span id="sp">---</span>
</div>

<div class="price-row">
  <input id="price" placeholder="Nhập giá">
  <button onclick="confirmPrice()">✔ OK</button>
</div>

<button class="scan-btn" onclick="startScan()">📷 QUÉT</button>

<div id="reader"></div>

<div class="list" id="list"></div>

<script>
let currentSP = "";
let lastScan = "";
let dataList = JSON.parse(localStorage.getItem("data")) || [];
let scanner;
let priceOK = false;

function save() {
  localStorage.setItem("data", JSON.stringify(dataList));
}

function render() {
  let html = "";
  dataList.forEach((i, idx) => {
    html += `<div class="item" onclick="removeItem(${idx})">
      ${idx+1}. ${i.sp} | ${i.phone} | ${i.price}
      <br><span class="time">${i.time}</span>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function removeItem(i) {
  dataList.splice(i,1);
  save();
  render();
}

function confirmPrice() {
  if (!document.getElementById("price").value) {
    alert("Nhập giá!");
    return;
  }
  priceOK = true;
  alert("Đã ghi nhận giá");
}

function timeNow() {
  return new Date().toLocaleTimeString();
}

function toggleItem(phone) {
  if (!priceOK) {
    alert("Chưa xác nhận giá!");
    return;
  }

  let index = dataList.findIndex(i => i.phone === phone && i.sp === currentSP);

  if (index !== -1) {
    dataList.splice(index,1);
  } else {
    dataList.push({
      sp: currentSP,
      phone: phone,
      price: document.getElementById("price").value,
      time: timeNow()
    });
  }

  save();
  render();
}

function onScanSuccess(text) {
  if (text === lastScan) return;
  lastScan = text;
  setTimeout(() => lastScan = "", 300);

  if (isNaN(text)) {
    currentSP = text;
    document.getElementById("sp").innerText = text;
    priceOK = false; // reset giá khi đổi SP
  } else {
    if (!currentSP) return;
    toggleItem(text);
  }
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  Html5Qrcode.getCameras().then(devices => {
    let backCam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0];

    scanner = new Html5Qrcode("reader");

    scanner.start(backCam.id, {
      fps: 20,
      qrbox: 180
    }, onScanSuccess);
  });
}

render();
</script>

</body>
</html>
