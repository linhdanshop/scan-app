<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TEST CHUẨN</title>

<style>
body { font-family: Arial; max-width:500px; margin:auto; padding:10px; background:#f5f5f5; }

input {
  width:100%;
  padding:16px;
  font-size:20px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.status {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:5px;
}

#log { margin-top:10px; }
.ok { color:green; }
.err { color:red; }
</style>
</head>

<body>

<h2>📦 TEST CHUẨN</h2>

<input id="gia" placeholder="Nhập giá">

<div class="status" id="status">Chưa có MSP</div>

<input id="scanInput" placeholder="Nhập MSP hoặc SĐT rồi Enter">

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

<script>

let gia = 0;
let masp = "";
let count = 0;
let lock = false;

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
}

// ===== NHẬP GIÁ =====
document.getElementById("gia").addEventListener("change", e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    gia = parseInt(v)*1000;
    masp = "";
    count = 0;
    update();
    log("💰 Nhập giá OK → quét MSP");
  }
});

// ===== NHẬP DỮ LIỆU =====
document.getElementById("scanInput").addEventListener("keydown", e=>{

  if(e.key !== "Enter") return;

  if(lock) return; // chống double
  lock = true;

  let text = e.target.value.trim();
  e.target.value = "";

  handle(text);

  setTimeout(()=> lock = false, 150);
});

// ===== XỬ LÝ =====
function handle(text){

  if(!text) return;

  if(!gia){
    log("❌ Nhập giá trước","err");
    return;
  }

  // chưa có MSP
  if(!masp){

    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: " + masp;
      log("📦 " + masp);
      return;
    }

    if(isPhone(text)){
      log("❌ Phải nhập MSP trước","err");
      return;
    }
  }

  // đã có MSP → nhận SĐT
  if(masp){

    if(isPhone(text)){
      count++;
      update();
      log("✔ " + masp + " | " + text);
      return;
    }

    if(isMSP(text)){
      log("❌ Đang quét SĐT, không phải MSP","err");
      return;
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: " + count;
}

// auto focus
setInterval(()=>{
  document.getElementById("scanInput").focus();
}, 500);

</script>

</body>
</html>
