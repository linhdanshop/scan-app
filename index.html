<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Pro Final</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.header {
  padding: 15px;
  background: #2196f3;
  color: white;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 15px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  background: #4caf50;
  color: white;
  border: none;
}

#reader {
  margin-top: 15px;
}

video {
  width: 100% !important;
  border-radius: 12px;
}

.status {
  margin-top: 10px;
  font-weight: bold;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.actions button {
  width: auto;
  margin-right: 5px;
  padding: 8px;
}
</style>
</head>

<body>

<div class="header">📷 Scan Pro Final</div>

<div class="container">

<input id="employee" placeholder="👤 Nhân viên">
<input id="price" placeholder="💰 Nhập giá">

<button onclick="confirmPrice()">OK</button>
<button onclick="startScan()">📷 Bắt đầu quét</button>

<div id="reader"></div>

<div class="status" id="status">Chưa bắt đầu</div>

<button onclick="exportExcel()">📥 Xuất Excel</button>

<div id="list"></div>

</div>

<script>
let scanner;
let step = 1;

let data = {
  price: "",
  product: "",
  phone: ""
};

let list = [];

function confirmPrice() {
  let price = document.getElementById("price").value;

  if (!price) {
    alert("Nhập giá trước!");
    return;
  }

  data.price = price;
  step = 2;

  document.getElementById("status").innerText =
    "💰 Giá: " + price + " → quét mã sản phẩm";
}

function startScan() {
  document.getElementById("status").innerText = "📷 Đang mở camera...";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" }, // FIX CAM SAU
    {
      fps: 20,
      qrbox: { width: 280, height: 280 }
    },
    onScanSuccess
  ).then(() => {
    document.getElementById("status").innerText = "📷 Đang quét...";
  }).catch(err => {
    document.getElementById("status").innerText = "❌ Không mở được camera";
  });
}

function onScanSuccess(decodedText) {

  if (step === 1) {
    alert("Nhập giá trước!");
    return;
  }

  if (step === 2) {
    data.product = decodedText;
    step = 3;

    document.getElementById("status").innerText =
      "📦 " + decodedText + " → quét số điện thoại";
    return;
  }

  if (step === 3) {
    data.phone = decodedText;

    saveData();
    resetFlow();
  }
}

function saveData() {
  let employee = document.getElementById("employee").value || "NV01";

  list.push({
    ...data,
    employee: employee,
    time: new Date().toLocaleString()
  });

  renderList();
}

function renderList() {
  let html = "";

  list.forEach((item, index) => {
    html += `
      <div class="item">
        <div>👤 ${item.employee}</div>
        <div>💰 ${item.price}</div>
        <div>📦 ${item.product}</div>
        <div>📞 ${item.phone}</div>
        <div>⏰ ${item.time}</div>

        <div class="actions">
          <button onclick="editItem(${index})">✏️ Sửa</button>
          <button onclick="deleteItem(${index})">🗑 Xoá</button>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function editItem(index) {
  let item = list[index];

  document.getElementById("price").value = item.price;

  data = item;
  step = 2;

  document.getElementById("status").innerText =
    "✏️ Đang sửa → quét lại";
}

function deleteItem(index) {
  list.splice(index, 1);
  renderList();
}

function resetFlow() {
  data = { price: "", product: "", phone: "" };
  step = 1;

  document.getElementById("price").value = "";

  document.getElementById("status").innerText =
    "✅ Đã lưu → nhập giá mới";
}

function exportExcel() {
  let csv = "Employee,Price,Product,Phone,Time\n";

  list.forEach(i => {
    csv += `${i.employee},${i.price},${i.product},${i.phone},${i.time}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scan_data.csv";
  a.click();
}
</script>

</body>
</html>
