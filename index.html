<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCAN PRO UI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }
.container { max-width:520px; margin:auto; padding:10px; }

.row { display:flex; gap:8px; }

input {
  flex:1;
  padding:16px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.box {
  flex:1;
  background:#fff;
  padding:14px;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
}

.red { color:red; }
.blue { color:#007bff; }

.okmark { color:green; margin-left:5px; }

button {
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.btn-blue { background:#007bff; }
.btn-red { background:#e53935; }

.status { margin-top:8px; }

.table {
  margin-top:10px;
  background:#fff;
  border-radius:10px;
  padding:8px;
  font-size:14px;
}

.table-header {
  font-weight:bold;
  display:flex;
  border-bottom:1px solid #ddd;
  padding-bottom:5px;
}

.row-item {
  display:flex;
  padding:4px 0;
  border-bottom:1px solid #eee;
}

.cell { flex:1; }

.warn { color:orange; }

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}

.toast.show { opacity:1; }

#reader {
  margin-top:10px;
  max-height:180px; /* 🔥 camera nhỏ lại */
  overflow:hidden;
}
</style>
</head>

<body>

<div class="container">

<h3 style="text-align:center">📦 QUÉT ĐƠN PRO</h3>

<!-- GIÁ + MSP -->
<div class="row">
  <input id="gia" placeholder="Giá">
  <div class="box red" id="giaBox">Giá: --</div>
</div>

<div class="row">
  <div class="box blue" id="mspBox">MSP: --</div>
</div>

<!-- INPUT -->
<input id="scanInput" placeholder="Quét MSP hoặc SĐT">

<!-- CAMERA -->
<div class="row">
  <button class="btn-blue" onclick="startCam()">📷 Cam</button>
  <button class="btn-red" onclick="stopCam()">⛔ Tắt</button>
</div>

<div id="reader"></div>

<!-- COUNT -->
<div class="row status">
  <div class="box">MSP: <span id="countMSP">0</span></div>
  <div class="box">Tổng: <span id="countAll">0</span></div>
</div>

<!-- TABLE -->
<div class="table">
  <div class="table-header">
    <div class="cell">MSP</div>
    <div class="cell">SĐT</div>
    <div class="cell">Giá</div>
    <div class="cell">Time</div>
  </div>
  <div id="data"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

let gia = "";
let masp = "";
let countMSP = 0;
let countAll = 0;
let lock = false;
let dataList = [];

function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== UI =====
function updateUI(){
  document.getElementById("giaBox").innerHTML =
    gia ? "Giá: "+gia+" ✔" : "Giá: --";

  document.getElementById("mspBox").innerHTML =
    masp ? "MSP: "+masp+" ✔" : "MSP: --";

  document.getElementById("countMSP").innerText = countMSP;
  document.getElementById("countAll").innerText = countAll;
}

// ===== TOAST =====
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"),1500);
}

// ===== GIÁ =====
document.getElementById("gia").addEventListener("input", e=>{
  gia = e.target.value.trim();
  updateUI();
});

// ===== SCAN =====
document.getElementById("scanInput").addEventListener("keydown", e=>{
  if(e.key !== "Enter") return;
  if(lock) return;

  lock = true;

  let text = e.target.value.trim();
  e.target.value = "";

  process(text);

  setTimeout(()=> lock=false, 400); // 🔥 delay chống trùng
});

// ===== XỬ LÝ =====
function process(text){

  if(!text) return;

  // MSP
  if(isMSP(text)){

    if(masp && text !== masp){
      masp = text;
      gia = "";
      document.getElementById("gia").value = "";
      countMSP = 0;
      showToast("MSP mới → nhập giá");
      updateUI();
      return;
    }

    if(!masp){
      if(!gia){
        showToast("Nhập giá trước");
        return;
      }
      masp = text;
      updateUI();
      return;
    }
  }

  // SĐT
  if(isPhone(text)){

    if(!masp || !gia){
      showToast("Thiếu MSP hoặc giá");
      return;
    }

    let item = {
      masp,
      sdt:text,
      gia,
      time:new Date().toLocaleTimeString()
    };

    let duplicate = dataList.find(d =>
      d.masp===item.masp &&
      d.sdt===item.sdt &&
      d.gia===item.gia
    );

    if(duplicate){
      showToast("⚠️ Trùng SĐT");
    }

    dataList.unshift(item);

    countMSP++;
    countAll++;

    render();

    updateUI();
  }
}

// ===== RENDER =====
function render(){
  let html = "";
  dataList.slice(0,20).forEach(d=>{
    html += `
    <div class="row-item">
      <div class="cell">${d.masp}</div>
      <div class="cell">${d.sdt}</div>
      <div class="cell">${d.gia}</div>
      <div class="cell">${d.time}</div>
    </div>`;
  });
  document.getElementById("data").innerHTML = html;
}

// ===== CAMERA =====
let cam;

function startCam(){
  cam = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(devices=>{
    cam.start(
      devices[devices.length-1].id,
      { fps:8, qrbox:200 }, // 🔥 giảm lag + tăng nét
      text => process(text)
    );
  });
}

function stopCam(){
  if(cam) cam.stop();
}

</script>

</body>
</html>
