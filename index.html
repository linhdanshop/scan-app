<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* SP cực to */
.sp-box {
  width:100%;
  background:#fff;
  padding:20px;
  text-align:center;
  font-size:32px;
  font-weight:bold;
  color:#007bff;
}

/* giá + nút */
.price-row {
  display:flex;
  width:100%;
}

.price-row input {
  flex:1;
  font-size:28px;
  padding:20px;
  border:none;
}

.price-row button {
  width:40%;
  font-size:26px;
  background:#28a745;
  color:white;
  border:none;
}

/* nút scan cực to */
.scan-btn {
  width:100%;
  font-size:32px;
  padding:25px;
  background:#007bff;
  color:white;
  border:none;
}

/* camera */
#reader {
  width:100%;
  display:none;
}

/* list to */
.list {
  font-size:20px;
  padding:10px;
}

.item {
  padding:15px;
  border-bottom:1px solid #ddd;
}

.time {
  font-size:14px;
  color:#777;
}
</style>
</head>

<body>

<div class="sp-box">
  SP: <span id="sp">---</span>
</div>

<div class="price-row">
  <input id="price" placeholder="NHẬP GIÁ">
  <button onclick="confirmPrice()">✔ OK</button>
</div>

<button class="scan-btn" onclick="startScan()">📷 QUÉT NGAY</button>

<div id="reader"></div>

<div class="list" id="list"></div>

<script>
let currentSP = "";
let lastScan = "";
let dataList = JSON.parse(localStorage.getItem("data")) || [];
let scanner;
let priceOK = false;

function save() {
  localStorage.setItem("data", JSON.stringify(dataList));
}

function render() {
  let html = "";
  dataList.forEach((i, idx) => {
    html += `<div class="item" onclick="removeItem(${idx})">
      ${idx+1}. ${i.sp} | ${i.phone} | ${i.price}
      <br><span class="time">${i.time}</span>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function removeItem(i) {
  dataList.splice(i,1);
  save();
  render();
}

function confirmPrice() {
  if (!document.getElementById("price").value) {
    alert("Nhập giá!");
    return;
  }
  priceOK = true;
  alert("OK giá");
}

function timeNow() {
  return new Date().toLocaleTimeString();
}

function toggleItem(phone) {
  if (!priceOK) {
    alert("Chưa OK giá!");
    return;
  }

  let index = dataList.findIndex(i => i.phone === phone && i.sp === currentSP);

  if (index !== -1) {
    dataList.splice(index,1);
  } else {
    dataList.push({
      sp: currentSP,
      phone: phone,
      price: document.getElementById("price").value,
      time: timeNow()
    });
  }

  save();
  render();
}

function onScanSuccess(text) {
  if (text === lastScan) return;
  lastScan = text;
  setTimeout(() => lastScan = "", 300);

  if (isNaN(text)) {
    currentSP = text;
    document.getElementById("sp").innerText = text;
    priceOK = false;
  } else {
    if (!currentSP) return;
    toggleItem(text);
  }
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  Html5Qrcode.getCameras().then(devices => {
    let backCam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0];

    scanner = new Html5Qrcode("reader");

    scanner.start(backCam.id, {
      fps: 20,
      qrbox: 200
    }, onScanSuccess);
  });
}

render();
</script>

</body>
</html>
