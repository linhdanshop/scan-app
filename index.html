<script>

let gia = 0;
let masp = "";
let count = 0;
let lock = false;

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
}

// ===== NHẬP GIÁ (KHÔNG AUTO) =====
document.getElementById("gia").addEventListener("keydown", e=>{

  if(e.key !== "Enter") return;

  let v = e.target.value.trim();

  if(!/^\d+$/.test(v)){
    log("❌ Giá sai","err");
    return;
  }

  gia = parseInt(v) * 1000;
  masp = "";
  count = 0;

  document.getElementById("status").innerText = "Chưa có MSP";

  log("💰 Giá OK → quét MSP");
  update();
});


// ===== NHẬP SCAN =====
document.getElementById("scanInput").addEventListener("keydown", e=>{

  if(e.key !== "Enter") return;

  if(lock) return;
  lock = true;

  let text = e.target.value.trim();
  e.target.value = "";

  handle(text);

  setTimeout(()=> lock = false, 150);
});


// ===== XỬ LÝ =====
function handle(text){

  if(!text) return;

  // ❌ CHƯA NHẬP GIÁ → CHẶN
  if(!gia){
    log("❌ Nhập giá trước","err");
    return;
  }

  // ===== MSP =====
  if(!masp){

    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: " + masp;
      log("📦 " + masp);
      return;
    }

    if(isPhone(text)){
      log("❌ Phải quét MSP trước","err");
      return;
    }
  }

  // ===== SĐT =====
  if(masp){

    if(isPhone(text)){
      count++;
      update();
      log("✔ " + masp + " | " + text);
      return;
    }

    if(isMSP(text)){
      log("❌ Đang quét SĐT","err");
      return;
    }
  }

  log("❌ Sai dữ liệu","err");
}


// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: " + count;
}

</script>
