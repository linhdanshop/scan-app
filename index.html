<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCAN FIX</title>

<style>
body { font-family: Arial; max-width:500px; margin:auto; padding:10px; background:#f5f5f5; }

input {
  width:100%;
  padding:16px;
  font-size:20px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.status {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:5px;
}

#log { margin-top:10px; }
.ok { color:green; }
.err { color:red; }
</style>
</head>

<body>

<h2>📦 SCAN FIX</h2>

<input id="gia" placeholder="Nhập giá rồi Enter">

<div class="status" id="status">Chưa có MSP</div>

<input id="scanInput" placeholder="Nhập MSP hoặc SĐT rồi Enter">

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

<script>

window.onload = function(){

let gia = 0;
let masp = "";
let count = 0;
let lock = false;

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
}

// ===== GIÁ =====
document.getElementById("gia").addEventListener("keydown", function(e){

  if(e.key !== "Enter") return;

  let v = this.value.trim();

  if(!/^\d+$/.test(v)){
    log("❌ Giá sai","err");
    return;
  }

  gia = parseInt(v) * 1000;
  masp = "";
  count = 0;

  document.getElementById("status").innerText = "Chưa có MSP";

  log("💰 Giá OK → quét MSP");
  update();
});

// ===== SCAN =====
document.getElementById("scanInput").addEventListener("keydown", function(e){

  if(e.key !== "Enter") return;

  if(lock) return;
  lock = true;

  let text = this.value.trim();
  this.value = "";

  handle(text);

  setTimeout(function(){
    lock = false;
  }, 150);
});

// ===== XỬ LÝ =====
function handle(text){

  if(!text) return;

  if(!gia){
    log("❌ Nhập giá trước","err");
    return;
  }

  if(!masp){

    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: " + masp;
      log("📦 " + masp);
      return;
    }

    if(isPhone(text)){
      log("❌ Phải quét MSP trước","err");
      return;
    }
  }

  if(masp){

    if(isPhone(text)){
      count++;
      update();
      log("✔ " + masp + " | " + text);
      return;
    }

    if(isMSP(text)){
      log("❌ Đang quét SĐT","err");
      return;
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: " + count;
}

};

</script>

</body>
</html>
