<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QUÉT ĐƠN PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }
.container { max-width:500px; margin:auto; padding:10px; }

h2 { text-align:center; }

input {
  width:100%;
  padding:18px;
  font-size:20px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:12px;
  margin:5px 0;
  color:white;
}

.btn-blue { background:#007bff; }
.btn-red { background:#e53935; }

.status {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:5px;
  font-size:18px;
}

#log {
  margin-top:10px;
  max-height:200px;
  overflow:auto;
  font-size:16px;
}

.ok { color:green; }
.err { color:red; }
.warn { color:orange; }

.highlight {
  background:#fff3cd;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 QUÉT ĐƠN PRO</h2>

<input id="gia" placeholder="Nhập giá (vd 157)">

<div class="status" id="status">Chưa có MSP</div>

<input id="scanInput" placeholder="Quét MSP hoặc SĐT">

<button class="btn-blue" onclick="startCam()">📷 Mở camera</button>
<button class="btn-red" onclick="stopCam()">⛔ Tắt camera</button>

<div id="reader"></div>

<div class="status" id="count">Số lượng: 0</div>

<div id="log"></div>

</div>

<script>

let gia = "";
let masp = "";
let count = 0;
let lock = false;

const okSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const errSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
}

// ===== GIÁ =====
document.getElementById("gia").addEventListener("input", e=>{
  gia = e.target.value.trim();
});

// ===== SCAN INPUT =====
document.getElementById("scanInput").addEventListener("keydown", e=>{

  if(e.key !== "Enter") return;
  if(lock) return;

  lock = true;

  let text = e.target.value.trim();
  e.target.value = "";

  processScan(text);

  setTimeout(()=> lock=false, 150);
});

// ===== XỬ LÝ =====
function processScan(text){

  if(!text) return;

  // ===== MSP =====
  if(isMSP(text)){

    // MSP mới khác MSP cũ
    if(masp && text !== masp){
      masp = text;
      gia = ""; // reset giá
      document.getElementById("gia").value = "";

      document.getElementById("status").innerText = "MSP: " + masp;
      log("📦 MSP mới → nhập lại giá", "warn");
      errSound.play();
      return;
    }

    // MSP đầu tiên
    if(!masp){
      if(!gia){
        log("❌ Nhập giá trước","err");
        errSound.play();
        return;
      }

      masp = text;
      document.getElementById("status").innerText = "MSP: " + masp;
      log("📦 " + masp);
      okSound.play();
      return;
    }

    return;
  }

  // ===== SĐT =====
  if(isPhone(text)){

    if(!masp){
      log("❌ Quét MSP trước","err");
      errSound.play();
      return;
    }

    if(!gia){
      log("❌ Thiếu giá","err");
      errSound.play();
      return;
    }

    count++;
    update();

    log(`✔ ${masp} | ${text} | ${gia}000`);
    okSound.play();

    return;
  }

  log("❌ Sai dữ liệu","err");
  errSound.play();
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: " + count;
}

// ===== CAMERA =====
let cam;

function startCam(){
  cam = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    if(devices.length){
      cam.start(
        devices[devices.length-1].id,
        { fps:10, qrbox:250 },
        text => processScan(text) // 🔥 giống Enter
      );
    }
  });
}

function stopCam(){
  if(cam) cam.stop();
}

</script>

</body>
</html>
