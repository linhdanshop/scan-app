<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan Pro Final</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
}

/* khung rõ ràng */
.box {
  border:2px solid #ddd;
  margin:8px;
  border-radius:12px;
  background:#fff;
}

/* SP nổi bật */
.sp-box {
  padding:20px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
  color:#007bff;
  border:2px solid #007bff;
}

/* giá + nút */
.price-row {
  display:flex;
  gap:8px;
  padding:10px;
}

.price-row input {
  flex:1;
  font-size:26px;
  padding:15px;
  border:2px solid #ccc;
  border-radius:10px;
}

.price-row button {
  width:35%;
  font-size:22px;
  border:none;
  border-radius:10px;
  background:#28a745;
  color:white;
  border:2px solid #1e7e34;
}

/* nút scan */
.scan-btn {
  width:calc(100% - 16px);
  margin:8px;
  padding:22px;
  font-size:28px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:12px;
  border:2px solid #0056b3;
}

/* camera vừa phải - vuông */
#reader {
  width:300px;
  height:300px;
  margin:10px auto;
  display:none;
  border:3px solid #333;
  border-radius:12px;
}

/* danh sách */
.list {
  margin:8px;
  border:2px solid #ddd;
  border-radius:12px;
  background:#fff;
  max-height:250px;
  overflow:auto;
}

.item {
  padding:12px;
  border-bottom:1px solid #eee;
  font-size:16px;
}

.item:active {
  background:#ffecec;
}

.status {
  text-align:center;
  font-size:16px;
  padding:5px;
}
</style>
</head>

<body>

<div class="box sp-box">
  SP: <span id="sp">---</span>
</div>

<div class="box price-row">
  <input id="price" placeholder="NHẬP GIÁ">
  <button onclick="confirmPrice()">✔ OK</button>
</div>

<button class="scan-btn" onclick="startScan()">📷 QUÉT</button>

<div id="reader"></div>

<div class="status" id="status">Sẵn sàng</div>

<div class="list" id="list"></div>

<script>
let currentSP = "";
let lastScan = "";
let dataList = JSON.parse(localStorage.getItem("data")) || [];
let scanner;
let priceOK = false;

function save() {
  localStorage.setItem("data", JSON.stringify(dataList));
}

function render() {
  let html = "";
  dataList.forEach((i, idx) => {
    html += `<div class="item" onclick="removeItem(${idx})">
      ${idx+1}. ${i.sp} | ${i.phone} | ${i.price}
      <br><small>${i.time}</small>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function removeItem(i) {
  dataList.splice(i,1);
  save();
  render();
}

function confirmPrice() {
  if (!price.value) {
    status.innerText = "❌ Nhập giá trước";
    return;
  }
  priceOK = true;
  status.innerText = "✅ Đã OK giá";
}

function timeNow() {
  return new Date().toLocaleTimeString();
}

function toggleItem(phone) {
  if (!priceOK) {
    status.innerText = "❌ Chưa OK giá";
    return;
  }

  let index = dataList.findIndex(i => i.phone === phone && i.sp === currentSP);

  if (index !== -1) {
    dataList.splice(index,1);
    status.innerText = "🗑 Đã xóa";
  } else {
    dataList.push({
      sp: currentSP,
      phone: phone,
      price: price.value,
      time: timeNow()
    });
    status.innerText = "✅ Đã thêm";
  }

  save();
  render();
}

function onScanSuccess(text) {
  if (text === lastScan) return;
  lastScan = text;
  setTimeout(() => lastScan = "", 200);

  if (isNaN(text)) {
    currentSP = text;
    sp.innerText = text;
    priceOK = false;
    status.innerText = "📦 SP mới";
  } else {
    if (!currentSP) {
      status.innerText = "❌ Chưa có SP";
      return;
    }
    toggleItem(text);
  }
}

function startScan() {
  reader.style.display = "block";
  status.innerText = "📷 Đang mở camera...";

  Html5Qrcode.getCameras().then(devices => {
    let backCam = devices.find(d =>
      d.label.toLowerCase().includes("back") ||
      d.label.toLowerCase().includes("rear")
    ) || devices[0];

    scanner = new Html5Qrcode("reader");

    scanner.start(
      backCam.id,
      {
        fps: 25,              // MAX tốc độ
        qrbox: { width: 220, height: 220 }, // vùng scan to hơn
        aspectRatio: 1        // vuông
      },
      onScanSuccess
    );

    status.innerText = "📷 Đang quét...";
  }).catch(err => {
    status.innerText = "❌ Không mở được camera";
  });
}

render();
</script>

</body>
</html>
