<script>

let gia = 0;
let masp = "";
let count = 0;

let processing = false;

// ===== CHECK =====
function isPhone(t){ return /^\d{10}$/.test(t); }
function isMSP(t){ return /[A-Za-z]/.test(t) && /\d/.test(t); }

// ===== LOG =====
function log(msg, cls="ok"){
  const el = document.getElementById("log");
  el.innerHTML = `<div class="${cls}">${msg}</div>` + el.innerHTML;
}

// ===== GIÁ =====
document.getElementById("gia").addEventListener("change", e=>{
  let v = e.target.value.trim();
  if(/^\d+$/.test(v)){
    gia = parseInt(v)*1000;
    masp = "";
    count = 0;
    update();
    log("💰 OK → quét MSP");
  }
});

// ===== NHẬP =====
document.getElementById("scanInput").addEventListener("keydown", e=>{

  if(e.key !== "Enter") return;

  if(processing) return; // 🔥 CHỐNG LOẠN
  processing = true;

  let text = e.target.value.trim();
  e.target.value = "";

  handle(text);

  setTimeout(()=>{
    processing = false;
  }, 200); // khóa 200ms
});

// ===== XỬ LÝ =====
function handle(text){

  if(!text) return;

  if(!gia){
    return log("❌ Nhập giá trước","err");
  }

  // MSP
  if(!masp){
    if(isMSP(text)){
      masp = text;
      document.getElementById("status").innerText = "MSP: "+masp;
      return log("📦 "+masp);
    }

    if(isPhone(text)){
      return log("❌ Quét MSP trước","err");
    }
  }

  // SĐT
  if(masp){
    if(isPhone(text)){
      count++;
      update();
      return log(`✔ ${masp} | ${text}`);
    }

    if(isMSP(text)){
      return log("❌ Đang quét SĐT","err");
    }
  }

  log("❌ Sai dữ liệu","err");
}

// ===== UI =====
function update(){
  document.getElementById("count").innerText = "Số lượng: "+count;
}

</script>
