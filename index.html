<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QUÉT ĐƠN PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:10px;
  text-align:center;
}

h2{margin-bottom:10px;}

.row{display:flex; gap:10px; margin-bottom:10px;}

input{
  flex:1;
  padding:15px;
  font-size:20px;
  border-radius:10px;
  border:1px solid #ccc;
}

.box{
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
  border:2px solid #ddd;
}

#giaBox{color:red;}
#mspBox{
  font-size:22px;
  border:2px solid #007bff;
  margin-bottom:10px;
}

#countAll{color:red; font-weight:bold;}

button{
  flex:1;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.cam{background:#007bff;}
.stop{background:red;}

.table{
  background:#fff;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

.rowItem{
  display:flex;
  border-bottom:1px solid #eee;
  padding:6px 0;
}

.cell{flex:1;}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  z-index:9999;
}

/* CAMERA */
#reader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:9999;
  display:none;
}

#readerBox{
  width:100%;
  height:100%;
}

#closeCam{
  position:absolute;
  top:20px;
  right:20px;
  background:red;
  color:#fff;
  padding:12px;
  border-radius:50%;
  font-size:18px;
  z-index:10000;
}
</style>

</head>

<body>

<h2>📦 QUÉT ĐƠN PRO</h2>

<div class="row">
  <input id="gia" placeholder="Nhập giá">
  <div class="box" id="giaBox">--</div>
</div>

<div class="box" id="mspBox">MSP: --</div>

<input id="scan" placeholder="Quét MSP hoặc SĐT">

<div class="row">
  <button class="cam" onclick="startCam()">📷 Cam</button>
  <button class="stop" onclick="stopCam()">⛔ Tắt</button>
</div>

<div class="row">
  <div class="box">MSP: <span id="countMSP">0</span></div>
  <div class="box">Tổng: <span id="countAll">0</span></div>
</div>

<div class="table" id="list"></div>

<!-- CAMERA -->

<div id="reader">
  <div id="closeCam" onclick="stopCam()">✖</div>
  <div id="readerBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let gia="", masp="";
let countMSP=0, countAll=0;
let data=[];
let cam=null;

// nhập giá
document.getElementById("gia").addEventListener("input",e=>{
  gia=e.target.value.trim();
  updateUI();
});

// scan / enter
document.getElementById("scan").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    handleInput(e.target.value.trim());
    e.target.value="";
  }
});

function handleInput(val){

  if(!val) return;

  // chưa có giá
  if(!gia){
    showToast("Nhập giá trước");
    return;
  }

  // chưa có MSP -> lấy MSP (KHÔNG cần enter)
  if(!masp){
    masp=val;
    countMSP=0;
    updateUI();
    showToast("✔ Đã nhận MSP");
    return;
  }

  // đã có MSP -> ghi SĐT
  let obj={
    msp:masp,
    sdt:val,
    gia:gia,
    time:new Date().toLocaleTimeString()
  };

  data.unshift(obj);

  countMSP++;
  countAll++;

  render();
  updateUI();
  showToast("✔ Đã ghi nhận");
}

// render bảng
function render(){
  let html=`
  <div class="rowItem">
    <b class="cell">MSP</b>
    <b class="cell">SĐT</b>
    <b class="cell">Giá</b>
    <b class="cell">Time</b>
  </div>`;

  data.forEach(d=>{
    html+=`
    <div class="rowItem">
      <div class="cell">${d.msp}</div>
      <div class="cell">${d.sdt}</div>
      <div class="cell">${d.gia*1000}</div>
      <div class="cell">${d.time}</div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

// update UI
function updateUI(){

  document.getElementById("giaBox").innerHTML =
    gia ? gia + ' ✔' : "--";

  document.getElementById("mspBox").innerHTML =
    masp ? masp + ' ✔' : "MSP: --";

  document.getElementById("countMSP").innerText = countMSP;
  document.getElementById("countAll").innerText = countAll;
}

// toast
function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1200);
}

// CAMERA
function startCam(){

  document.getElementById("reader").style.display="block";

  cam = new Html5Qrcode("readerBox");

  Html5Qrcode.getCameras().then(devices=>{
    cam.start(
      devices[0].id,
      { fps: 15, qrbox: 300 },
      txt=>{
        handleInput(txt);
      }
    );
  });
}

function stopCam(){
  document.getElementById("reader").style.display="none";

  if(cam){
    cam.stop().then(()=>{
      cam.clear();
    });
  }
}

</script>

</body>
</html>
